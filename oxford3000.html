<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oxford 3000 Vocabulary Trainer</title>
    <link href="https://fonts.googleapis.com/css2?family=Bitter:wght@400;600;700&family=Karla:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg: #f4efe6;
            --bg-dot: #d5cdbf;
            --bg-card: #fdfaf4;
            --bg-card-alt: #eee9df;
            --primary: #1e3a2f;
            --primary-light: #2d5a48;
            --primary-fade: rgba(30,58,47,0.10);
            --accent: #b86e3f;
            --accent-light: #c9834f;
            --accent-fade: rgba(184,110,63,0.12);
            --text: #2c2825;
            --text-muted: #7a746d;
            --text-light: #a39d96;
            --border: #d5cdbf;
            --success: #27764a;
            --success-fade: rgba(39,118,74,0.10);
            --error: #b83830;
            --error-fade: rgba(184,56,48,0.10);
            --shadow: 0 2px 12px rgba(42,37,34,0.07);
            --shadow-lg: 0 8px 32px rgba(42,37,34,0.13);
        }
        html.dark {
            --bg: #121a1d;
            --bg-dot: #1e2a2f;
            --bg-card: #1a2428;
            --bg-card-alt: #212d32;
            --primary: #5cb896;
            --primary-light: #74ceab;
            --primary-fade: rgba(92,184,150,0.12);
            --accent: #d49a6a;
            --accent-light: #e0ae82;
            --accent-fade: rgba(212,154,106,0.12);
            --text: #e4ded5;
            --text-muted: #8a847c;
            --text-light: #5a544d;
            --border: #2a363c;
            --success: #48a86a;
            --success-fade: rgba(72,168,106,0.12);
            --error: #d94848;
            --error-fade: rgba(217,72,72,0.12);
            --shadow: 0 2px 12px rgba(0,0,0,0.18);
            --shadow-lg: 0 8px 32px rgba(0,0,0,0.30);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Karla', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
            background-image: radial-gradient(circle, var(--bg-dot) 1px, transparent 1px);
            background-size: 22px 22px;
        }
        .container {
            max-width: 540px;
            margin: 0 auto;
            padding: 20px 16px 40px;
            min-height: 100vh;
        }
        h1, h2, h3 { font-family: 'Bitter', serif; color: var(--primary); }
        .screen { display: none; animation: fadeSlideIn 0.45s ease; }
        .screen.active { display: block; }
        @keyframes fadeSlideIn {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-out { animation: fadeSlideOut 0.28s ease forwards; }
        @keyframes fadeSlideOut {
            to { opacity: 0; transform: translateY(-10px); }
        }

        /* ── Welcome ── */
        .welcome-wrap { padding-top: 6vh; }
        .welcome-icon {
            width: 72px; height: 72px;
            background: var(--primary);
            border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 22px;
            font-size: 30px; color: #fff;
            transform: rotate(-4deg);
            box-shadow: var(--shadow-lg);
            animation: iconPop 0.6s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes iconPop {
            0% { transform: rotate(-4deg) scale(0.4); opacity: 0; }
            60% { transform: rotate(-4deg) scale(1.08); }
            100% { transform: rotate(-4deg) scale(1); opacity: 1; }
        }
        .welcome-title { text-align: center; margin-bottom: 6px; font-size: 24px; line-height: 1.3; }
        .welcome-sub { text-align: center; color: var(--text-muted); font-size: 14px; margin-bottom: 32px; line-height: 1.5; }
        .form-card {
            background: var(--bg-card);
            border: 2px solid var(--border);
            border-radius: 16px;
            padding: 24px 20px;
            box-shadow: var(--shadow);
        }
        .form-group { margin-bottom: 16px; }
        .form-group:last-of-type { margin-bottom: 0; }
        .form-label {
            display: block; font-weight: 600; font-size: 13px;
            color: var(--text-muted); margin-bottom: 5px;
            text-transform: uppercase; letter-spacing: 0.4px;
        }
        .form-label .cn { text-transform: none; letter-spacing: 0; font-weight: 500; }
        .form-input {
            width: 100%; padding: 11px 14px;
            border: 2px solid var(--border); border-radius: 10px;
            font-family: 'Karla', sans-serif; font-size: 16px;
            color: var(--text); background: var(--bg);
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-input:focus {
            outline: none; border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--primary-fade);
        }
        .form-input::placeholder { color: var(--text-light); }
        .form-error {
            background: var(--error-fade); border: 1.5px solid var(--error);
            color: var(--error); padding: 10px 14px; border-radius: 8px;
            font-size: 14px; margin-bottom: 14px; display: none;
        }
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            width: 100%; padding: 13px 24px;
            border: none; border-radius: 12px;
            font-family: 'Karla', sans-serif; font-size: 16px; font-weight: 700;
            cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .btn:active { transform: scale(0.98); }
        .btn-primary { background: var(--primary); color: #fff; box-shadow: var(--shadow); }
        .btn-primary:hover { background: var(--primary-light); }
        .btn-accent { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
        .btn-accent:hover { background: var(--accent-light); }
        .btn-ghost {
            background: transparent; color: var(--text-muted);
            font-weight: 600; font-size: 15px; padding: 10px;
        }
        .btn-ghost:hover { color: var(--primary); }
        .btn:disabled { opacity: 0.45; cursor: not-allowed; }
        .welcome-actions { margin-top: 20px; }
        .welcome-actions .btn-ghost { margin-top: 4px; }

        /* ── Progress Bar ── */
        .progress-row {
            display: flex; align-items: center; gap: 8px; margin-bottom: 22px;
        }
        .progress-label { font-size: 12px; font-weight: 700; color: var(--text-muted); white-space: nowrap; letter-spacing: 0.3px; }
        .progress-track { flex: 1; display: flex; gap: 6px; }
        .progress-seg {
            flex: 1; height: 6px; border-radius: 3px;
            background: var(--border); transition: background 0.4s;
        }
        .progress-seg.done { background: var(--success); }
        .progress-seg.active { background: var(--primary); position: relative; overflow: hidden; }
        .progress-seg.active::after {
            content: ''; position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 1.8s infinite;
        }
        @keyframes shimmer { 0%{transform:translateX(-100%)} 100%{transform:translateX(100%)} }

        /* ── Section Titles ── */
        .section-title { font-size: 20px; margin-bottom: 4px; }
        .section-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 20px; }

        /* ── Vocab Cards ── */
        .vocab-cards { display: flex; flex-direction: column; gap: 12px; margin-bottom: 24px; }
        .vocab-card {
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 14px; padding: 18px 18px 18px 22px;
            position: relative; overflow: hidden;
            opacity: 0; transform: translateX(-16px);
            animation: cardIn 0.5s ease forwards;
            box-shadow: var(--shadow);
        }
        .vocab-card:nth-child(1) { animation-delay: 0.1s; }
        .vocab-card:nth-child(2) { animation-delay: 0.28s; }
        .vocab-card:nth-child(3) { animation-delay: 0.46s; }
        @keyframes cardIn { to { opacity: 1; transform: translateX(0); } }
        .vocab-card::before {
            content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 4px;
        }
        .vocab-card:nth-child(1)::before { background: var(--primary); }
        .vocab-card:nth-child(2)::before { background: var(--accent); }
        .vocab-card:nth-child(3)::before { background: var(--success); }
        .vocab-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 4px; flex-wrap: wrap; }
        .vocab-word {
            font-family: 'Bitter', serif; font-size: 22px; font-weight: 700;
            color: var(--primary);
        }
        .vocab-pos { font-size: 13px; color: var(--accent); font-weight: 600; font-style: italic; }
        .vocab-level {
            font-size: 11px; font-weight: 700; padding: 2px 7px;
            border-radius: 6px; background: var(--primary-fade); color: var(--primary);
        }
        .vocab-chinese { font-size: 16px; color: var(--text); margin-top: 2px; }

        /* ── Exercise Illustration ── */
        .exercise-illustration {
            display: flex; justify-content: center; margin-bottom: 18px;
            animation: illustFadeIn 0.6s ease 0.15s both;
        }
        .exercise-illustration svg {
            width: 100%; max-width: 320px; height: auto;
            border-radius: 14px;
            background: var(--bg-card);
            border: 2px solid var(--border);
            box-shadow: var(--shadow);
        }
        @keyframes illustFadeIn {
            from { opacity: 0; transform: scale(0.94); }
            to { opacity: 1; transform: scale(1); }
        }

        /* ── Exercise ── */
        .exercise-hint {
            font-size: 14px; color: var(--text-muted);
            padding: 10px 14px; background: var(--accent-fade);
            border-radius: 10px; border-left: 3px solid var(--accent);
            margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
        }
        .word-bank { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 16px; }
        .word-pill {
            flex: 1 1 auto; min-width: 100px; text-align: center;
            padding: 8px 12px; background: var(--bg-card);
            border: 2px solid var(--border); border-radius: 12px;
            box-shadow: var(--shadow);
        }
        .word-pill-en {
            font-family: 'Bitter', serif; font-size: 15px;
            font-weight: 600; color: var(--primary); margin-bottom: 2px;
        }
        .word-pill-cn { font-size: 12px; color: var(--text-muted); }
        .passage-box {
            background: var(--bg-card); border: 2px solid var(--border);
            border-radius: 14px; padding: 22px 18px;
            line-height: 2.4; font-size: 16px;
            margin-bottom: 20px; box-shadow: var(--shadow);
        }
        .blank-input {
            display: inline-block; width: clamp(88px, 24vw, 130px);
            padding: 3px 6px; border: none;
            border-bottom: 2.5px solid var(--primary);
            background: transparent;
            font-family: 'Karla', sans-serif; font-size: 16px;
            color: var(--primary); font-weight: 600;
            text-align: center; transition: border-color 0.2s;
            vertical-align: baseline; border-radius: 0;
        }
        .blank-input:focus { outline: none; border-bottom-color: var(--accent); }
        .blank-input.correct {
            color: var(--success); border-bottom-color: var(--success);
            background: var(--success-fade); border-radius: 4px;
        }
        .blank-input.wrong {
            color: var(--error); border-bottom-color: var(--error);
            background: var(--error-fade); border-radius: 4px;
            text-decoration: line-through;
        }
        .correction { font-size: 13px; color: var(--success); font-weight: 700; margin-left: 2px; }

        /* ── Feedback Banner ── */
        .fb-banner {
            padding: 12px 16px; border-radius: 10px; margin-bottom: 14px;
            font-weight: 600; display: flex; align-items: center; gap: 10px; font-size: 15px;
        }
        .fb-banner.great { background: var(--success-fade); color: var(--success); border: 1.5px solid var(--success); }
        .fb-banner.ok { background: var(--accent-fade); color: var(--accent); border: 1.5px solid var(--accent); }
        .fb-banner.poor { background: var(--error-fade); color: var(--error); border: 1.5px solid var(--error); }

        /* ── Result ── */
        .result-card {
            background: var(--bg-card); border: 2.5px solid var(--primary);
            border-radius: 20px; padding: 32px 22px 28px;
            text-align: center; position: relative; overflow: hidden;
            box-shadow: var(--shadow-lg);
        }
        .result-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
            background: linear-gradient(90deg, var(--primary), var(--accent), var(--primary));
        }
        .result-badge {
            width: 76px; height: 76px; border-radius: 50%;
            background: var(--primary); color: #fff;
            display: flex; align-items: center; justify-content: center;
            margin: 8px auto 14px; font-size: 32px;
            box-shadow: var(--shadow-lg);
            animation: badgePop 0.6s 0.2s cubic-bezier(.34,1.56,.64,1) both;
        }
        @keyframes badgePop {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .result-heading { font-size: 18px; margin-bottom: 4px; }
        .result-score-wrap { margin: 14px 0; }
        .result-score {
            font-family: 'Bitter', serif; font-size: 52px;
            font-weight: 700; color: var(--primary); line-height: 1;
        }
        .result-score-total { font-size: 22px; color: var(--text-muted); font-weight: 600; }
        .result-msg { color: var(--text-muted); font-size: 15px; margin-bottom: 18px; }
        .result-exercises {
            display: flex; gap: 10px; justify-content: center; margin-bottom: 18px;
        }
        .result-ex {
            flex: 1; max-width: 110px; padding: 10px 8px;
            background: var(--bg-card-alt); border-radius: 10px; text-align: center;
        }
        .result-ex-label { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; }
        .result-ex-score { font-family: 'Bitter', serif; font-size: 22px; font-weight: 700; color: var(--primary); }
        .result-ex-score.perfect { color: var(--success); }
        .result-divider { border: none; border-top: 2px solid var(--border); margin: 16px 0; }
        .result-info-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 7px 0; font-size: 14px;
        }
        .result-info-label { color: var(--text-muted); }
        .result-info-val { font-weight: 600; color: var(--text); }
        .result-topics { margin-bottom: 16px; }
        .result-topics-label {
            font-size: 11px; color: var(--text-muted); font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.4px; margin-bottom: 8px;
        }
        .result-topic-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .result-topic-tag {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 5px 12px; border-radius: 20px;
            font-size: 13px; font-weight: 600;
            text-transform: capitalize;
            background: var(--primary-fade); color: var(--primary);
            border: 1.5px solid var(--primary);
        }
        .result-topic-tag i { font-size: 10px; opacity: 0.6; }
        .result-topic-tag:nth-child(2) {
            background: var(--accent-fade); color: var(--accent);
            border-color: var(--accent);
        }
        .result-topic-tag:nth-child(3) {
            background: var(--success-fade); color: var(--success);
            border-color: var(--success);
        }
        .result-actions { margin-top: 24px; display: flex; flex-direction: column; gap: 6px; }

        /* ── Confetti ── */
        .confetti-box { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
        .confetti-piece {
            position: absolute; top: -12px;
            animation: confDrop linear forwards;
        }
        @keyframes confDrop {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(105vh) rotate(720deg); opacity: 0; }
        }

        /* ── Modal ── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.45);
            display: flex; align-items: center; justify-content: center;
            z-index: 500; animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .modal-box {
            background: var(--bg-card); border-radius: 16px;
            padding: 24px 20px; max-width: 320px; width: 90%;
            box-shadow: var(--shadow-lg); text-align: center;
        }
        .modal-box p { margin-bottom: 18px; color: var(--text); font-size: 15px; line-height: 1.5; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns .btn { flex: 1; padding: 10px; font-size: 14px; }
        .modal-cancel { background: var(--bg-card-alt); color: var(--text-muted); }
        .modal-confirm { background: var(--primary); color: #fff; }

        /* ── Topic Picker ── */
        .btn-change-topic {
            display: inline-flex; align-items: center; gap: 5px;
            background: none; border: 1.5px solid var(--border);
            border-radius: 8px; padding: 5px 12px;
            font-family: 'Karla', sans-serif; font-size: 13px;
            font-weight: 600; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s;
        }
        .btn-change-topic:hover { border-color: var(--primary); color: var(--primary); }
        .btn-change-topic i { font-size: 12px; }
        .progress-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 22px; }
        .progress-header .progress-row { margin-bottom: 0; flex: 1; }
        .topic-picker-grid {
            display: grid; grid-template-columns: repeat(2, 1fr);
            gap: 10px; max-height: 58vh; overflow-y: auto;
            padding: 4px; -webkit-overflow-scrolling: touch;
        }
        .topic-card {
            background: var(--bg); border: 2px solid var(--border);
            border-radius: 12px; padding: 12px 12px;
            cursor: pointer; transition: all 0.2s; text-align: left;
        }
        .topic-card:hover { border-color: var(--primary); background: var(--primary-fade); }
        .topic-card:active { transform: scale(0.97); }
        .topic-card.used {
            opacity: 0.35; pointer-events: none;
            background: var(--bg-card-alt);
        }
        .topic-card.current-topic {
            border-color: var(--accent); background: var(--accent-fade);
        }
        .topic-card-name {
            font-family: 'Bitter', serif; font-size: 14px;
            font-weight: 600; color: var(--primary);
            text-transform: capitalize; margin-bottom: 3px;
        }
        .topic-card-words { font-size: 11px; color: var(--text-muted); line-height: 1.4; }
        .picker-heading {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 14px; padding-bottom: 10px; border-bottom: 2px solid var(--border);
        }
        .picker-heading h3 {
            margin: 0; font-family: 'Bitter', serif;
            color: var(--primary); font-size: 18px;
        }
        .picker-close {
            width: 32px; height: 32px; display: flex; align-items: center;
            justify-content: center; border: none; background: var(--bg-card-alt);
            border-radius: 8px; font-size: 20px; color: var(--text-muted);
            cursor: pointer; transition: all 0.2s; line-height: 1;
        }
        .picker-close:hover { background: var(--error-fade); color: var(--error); }

        @media(max-width:380px) {
            .container { padding: 16px 12px 32px; }
            .welcome-title { font-size: 21px; }
            .vocab-word { font-size: 19px; }
            .result-score { font-size: 44px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ═══ Welcome ═══ -->
        <div id="screen-welcome" class="screen">
            <div class="welcome-wrap">
                <div class="welcome-icon"><i class="fa-solid fa-book-open"></i></div>
                <h1 class="welcome-title">Oxford 3000<br>Vocabulary Trainer</h1>
                <p class="welcome-sub">Master essential English vocabulary through interactive fill-in-the-blank exercises.</p>
                <div class="form-card">
                    <div id="form-error" class="form-error">
                        <i class="fa-solid fa-circle-exclamation"></i> Please fill in all fields to continue.
                    </div>
                    <div class="form-group">
                        <label class="form-label">Class</label>
                        <input type="text" id="inp-class" class="form-input" placeholder="e.g. 3-2" spellcheck="false" autocorrect="off" autocapitalize="off">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Class Number</label>
                        <input type="text" id="inp-number" class="form-input" placeholder="e.g. 15" spellcheck="false" autocorrect="off" autocapitalize="off">
                    </div>
                    <div class="form-group">
                        <label class="form-label">Name</label>
                        <input type="text" id="inp-name" class="form-input" placeholder="Your name" spellcheck="false" autocorrect="off" autocapitalize="off">
                    </div>
                </div>
                <div class="welcome-actions">
                    <button class="btn btn-primary" id="btn-start">
                        <i class="fa-solid fa-graduation-cap"></i> Start Learning
                    </button>
                    <button class="btn btn-ghost" id="btn-guest">
                        Continue as Guest <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- ═══ Vocab Intro ═══ -->
        <div id="screen-vocab" class="screen">
            <div id="vocab-content"></div>
        </div>

        <!-- ═══ Exercise ═══ -->
        <div id="screen-exercise" class="screen">
            <div id="exercise-content"></div>
        </div>

        <!-- ═══ Result ═══ -->
        <div id="screen-result" class="screen active">
            <div id="result-content"></div>
        </div>
    </div>

<script>
/* ═══════════════════════════════════════
   Dark Mode
   ═══════════════════════════════════════ */
(function initDarkMode() {
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        document.documentElement.classList.add('dark');
    }
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (e.matches) { document.documentElement.classList.add('dark'); }
        else { document.documentElement.classList.remove('dark'); }
    });
})();

/* ═══════════════════════════════════════
   Vocabulary Data  (70 sets from Oxford 3000)
   ═══════════════════════════════════════ */
var VOCAB_SETS = [
    {
        topic: "ambition",

    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
        var j = Math.floor(Math.random() * (i + 1));
        var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
}
function esc(s) {
    var d = document.createElement("div");
    d.textContent = s;
    return d.innerHTML;
}

/* ═══════════════════════════════════════
   Screen Transition
   ═══════════════════════════════════════ */
function showScreen(id) {
    var cur = document.querySelector(".screen.active");
    if (cur) {
        cur.classList.add("fade-out");
        setTimeout(function() {
            cur.classList.remove("active", "fade-out");
            var next = document.getElementById(id);
            next.classList.add("active");
            window.scrollTo({ top: 0, behavior: "smooth" });
        }, 260);
    } else {
        document.getElementById(id).classList.add("active");
    }
}

/* ═══════════════════════════════════════
   Progress Bar HTML
   ═══════════════════════════════════════ */
function progressHTML() {
    var ci = state.currentExercise;
    var segs = "";
    for (var i = 0; i < 3; i++) {
        var cls = i < ci ? "done" : i === ci ? "active" : "";
        segs += '<div class="progress-seg ' + cls + '"></div>';
    }
    return '<div class="progress-header">' +
        '<div class="progress-row"><span class="progress-label">Exercise ' + (ci + 1) + ' / 3</span><div class="progress-track">' + segs + '</div></div>' +
        '<button class="btn-change-topic" onclick="showTopicPicker()"><i class="fa-solid fa-shuffle"></i> Topic</button>' +
    '</div>';
}

/* ═══════════════════════════════════════
   Welcome → Start
   ═══════════════════════════════════════ */
function startAsStudent() {
    var cl = document.getElementById("inp-class").value.trim();
    var num = document.getElementById("inp-number").value.trim();
    var nm = document.getElementById("inp-name").value.trim();
    if (!cl || !num || !nm) {
        document.getElementById("form-error").style.display = "block";
        return;
    }
    document.getElementById("form-error").style.display = "none";
    state.userInfo = { className: cl, classNumber: num, name: nm, isGuest: false };
    initExercises();
}
function startAsGuest() {
    document.getElementById("form-error").style.display = "none";
    state.userInfo = { className: "", classNumber: "", name: "", isGuest: true };
    initExercises();
}

/* ═══════════════════════════════════════
   Initialize Exercises
   ═══════════════════════════════════════ */
function initExercises() {
    state.exercises = shuffle(VOCAB_SETS).slice(0, 3);
    state.currentExercise = 0;
    state.scores = [0, 0, 0];
    state.finishTime = null;
    state.checked = false;
    renderVocab();
    showScreen("screen-vocab");
}

/* ═══════════════════════════════════════
   Vocab Introduction Screen
   ═══════════════════════════════════════ */
function renderVocab() {
    var set = state.exercises[state.currentExercise];
    var cards = "";
    for (var i = 0; i < set.words.length; i++) {
        var w = set.words[i];
        cards += '<div class="vocab-card">' +
            '<div class="vocab-header">' +
                '<span class="vocab-word">' + esc(w.word) + '</span>' +
                '<span class="vocab-pos">' + esc(w.pos) + '</span>' +
                '<span class="vocab-level">' + esc(w.level) + '</span>' +
            '</div>' +
            '<div class="vocab-chinese">' + esc(w.chinese) + '</div>' +
        '</div>';
    }
    document.getElementById("vocab-content").innerHTML =
        progressHTML() +
        '<h2 class="section-title"><i class="fa-solid fa-book-open" style="font-size:18px;margin-right:6px"></i> New Vocabulary</h2>' +
        '<p class="section-sub">Study these words carefully before the exercise.</p>' +
        '<div class="vocab-cards">' + cards + '</div>' +
        '<button class="btn btn-primary" id="btn-ready">' +
            'Ready to Practice <i class="fa-solid fa-arrow-right"></i>' +
        '</button>';
    document.getElementById("btn-ready").addEventListener("click", function() {
        renderExercise();
        showScreen("screen-exercise");
    });
}

/* ═══════════════════════════════════════
   Exercise (Fill-in-the-blank) Screen
   ═══════════════════════════════════════ */
function renderExercise() {
    state.checked = false;
    var set = state.exercises[state.currentExercise];

    // Topic illustration
    var illustHTML = '';
    if (set.topic) {
        var svg = getTopicSVG(set.topic);
        if (svg) {
            illustHTML = '<div class="exercise-illustration">' + svg + '</div>';
        }
    }

    // Word bank pills
    var pills = "";
    for (var i = 0; i < set.words.length; i++) {
        var w = set.words[i];
        pills += '<div class="word-pill"><div class="word-pill-en">' + esc(w.word) + '</div><div class="word-pill-cn">' + esc(w.chinese) + '</div></div>';
    }

    // Passage with blanks
    var passageText = set.passage.replace(/\{(\d)\}/g, function(m, idx) {
        return '<input type="text" class="blank-input" data-index="' + idx + '" placeholder="______" autocomplete="off" spellcheck="false" autocorrect="off" autocapitalize="off" aria-label="Blank ' + (parseInt(idx, 10) + 1) + '">';
    });

    document.getElementById("exercise-content").innerHTML =
        progressHTML() +
        '<h2 class="section-title"><i class="fa-solid fa-pen-to-square" style="font-size:18px;margin-right:6px"></i> Fill in the Blanks</h2>' +
        illustHTML +
        '<div class="exercise-hint"><i class="fa-solid fa-lightbulb"></i> Choose the correct word for each blank in the passage.</div>' +
        '<div class="word-bank">' + pills + '</div>' +
        '<div class="passage-box" id="passage-box">' + passageText + '</div>' +
        '<div id="exercise-actions">' +
            '<button class="btn btn-primary" id="btn-check"><i class="fa-solid fa-check"></i> Check Answers</button>' +
        '</div>';

    document.getElementById("btn-check").addEventListener("click", checkAnswers);

    // Focus & keyboard nav
    setTimeout(function() {
        var first = document.querySelector(".blank-input");
        if (first) first.focus();
    }, 400);

    var inputs = document.querySelectorAll(".blank-input");
    inputs.forEach(function(inp) {
        inp.addEventListener("keydown", function(e) {
            if (e.key === "Enter") {
                e.preventDefault();
                var idx = parseInt(inp.dataset.index, 10);
                var nxt = document.querySelector('.blank-input[data-index="' + (idx + 1) + '"]');
                if (nxt) { nxt.focus(); }
                else { checkAnswers(); }
            }
        });
    });
}

/* ═══════════════════════════════════════
   Check Answers
   ═══════════════════════════════════════ */
function checkAnswers() {
    if (state.checked) return;
    state.checked = true;

    var set = state.exercises[state.currentExercise];
    var inputs = document.querySelectorAll(".blank-input");
    var score = 0;

    inputs.forEach(function(inp) {
        var idx = parseInt(inp.dataset.index, 10);
        var user = inp.value.trim().toLowerCase();
        var correct = set.answers[idx].toLowerCase();
        inp.disabled = true;

        if (user === correct) {
            inp.classList.add("correct");
            score++;
        } else {
            inp.classList.add("wrong");
            var span = document.createElement("span");
            span.className = "correction";
            span.textContent = " \u2192 " + set.answers[idx];
            inp.parentNode.insertBefore(span, inp.nextSibling);
        }
    });

    state.scores[state.currentExercise] = score;

    // Feedback banner
    var cls, text, icon;
    if (score === 3) { cls = "great"; text = "Perfect! All 3 correct!"; icon = "fa-solid fa-star"; }
    else if (score === 2) { cls = "ok"; text = "Good job! 2 out of 3 correct."; icon = "fa-solid fa-thumbs-up"; }
    else if (score === 1) { cls = "poor"; text = "Keep trying! 1 out of 3 correct."; icon = "fa-solid fa-book-open"; }
    else { cls = "poor"; text = "Don\u2019t worry \u2014 review the words and try again!"; icon = "fa-solid fa-heart"; }

    var isLast = state.currentExercise === 2;
    var actionsEl = document.getElementById("exercise-actions");
    actionsEl.innerHTML =
        '<div class="fb-banner ' + cls + '"><i class="' + icon + '"></i> ' + text + '</div>' +
        '<button class="btn ' + (isLast ? "btn-accent" : "btn-primary") + '" id="btn-next">' +
            (isLast ? '<i class="fa-solid fa-trophy"></i> See My Results' : 'Next Exercise <i class="fa-solid fa-arrow-right"></i>') +
        '</button>';

    document.getElementById("btn-next").addEventListener("click", function() {
        if (isLast) { showResult(); }
        else { nextExercise(); }
    });
}

/* ═══════════════════════════════════════
   Next Exercise
   ═══════════════════════════════════════ */
function nextExercise() {
    state.currentExercise++;
    state.checked = false;
    renderVocab();
    showScreen("screen-vocab");
}

/* ═══════════════════════════════════════
   Result Screen
   ═══════════════════════════════════════ */
function showResult() {
    state.finishTime = new Date();
    var total = state.scores[0] + state.scores[1] + state.scores[2];

    var badgeIcon, msg;
    if (total >= 8) { badgeIcon = "fa-solid fa-trophy"; msg = "Outstanding! You\u2019ve mastered these words!"; }
    else if (total >= 6) { badgeIcon = "fa-solid fa-star"; msg = "Great work! Keep up the effort!"; }
    else if (total >= 4) { badgeIcon = "fa-solid fa-thumbs-up"; msg = "Good try! A bit more practice will help."; }
    else { badgeIcon = "fa-solid fa-book-open"; msg = "Keep learning \u2014 every step counts!"; }

    var dt = state.finishTime;
    var dateStr = dt.getFullYear() + "-" + String(dt.getMonth() + 1).padStart(2, "0") + "-" + String(dt.getDate()).padStart(2, "0");
    var timeStr = String(dt.getHours()).padStart(2, "0") + ":" + String(dt.getMinutes()).padStart(2, "0");

    // Exercise breakdown
    var exCards = "";
    for (var i = 0; i < 3; i++) {
        exCards += '<div class="result-ex"><div class="result-ex-label">Ex ' + (i + 1) + '</div><div class="result-ex-score' + (state.scores[i] === 3 ? " perfect" : "") + '">' + state.scores[i] + '/3</div></div>';
    }

    // Topics attempted
    var topicIcons = { 0: "fa-solid fa-bookmark", 1: "fa-solid fa-tag", 2: "fa-solid fa-hashtag" };
    var topicTags = "";
    for (var t = 0; t < state.exercises.length; t++) {
        var topicName = state.exercises[t].topic.replace(/_/g, " ");
        topicTags += '<span class="result-topic-tag"><i class="' + topicIcons[t] + '"></i>' + esc(topicName) + '</span>';
    }

    // Student info
    var infoRows = "";
    if (state.userInfo.isGuest) {
        infoRows = '<div class="result-info-row"><span class="result-info-label">Identity</span><span class="result-info-val">Guest</span></div>';
    } else {
        infoRows =
            '<div class="result-info-row"><span class="result-info-label">Class</span><span class="result-info-val">' + esc(state.userInfo.className) + '</span></div>' +
            '<div class="result-info-row"><span class="result-info-label">Number</span><span class="result-info-val">' + esc(state.userInfo.classNumber) + '</span></div>' +
            '<div class="result-info-row"><span class="result-info-label">Name</span><span class="result-info-val">' + esc(state.userInfo.name) + '</span></div>';
    }

    document.getElementById("result-content").innerHTML =
        '<div class="result-card" contenteditable="true" spellcheck="false">' +
            '<div class="result-badge"><i class="' + badgeIcon + '"></i></div>' +
            '<h2 class="result-heading">Vocabulary Test Results</h2>' +
            '<div class="result-score-wrap"><span class="result-score" id="score-num">0</span><span class="result-score-total"> / 9</span></div>' +
            '<p class="result-msg">' + msg + '</p>' +
            '<div class="result-exercises">' + exCards + '</div>' +
            '<div class="result-topics">' +
                '<div class="result-topics-label">Topics Attempted</div>' +
                '<div class="result-topic-tags">' + topicTags + '</div>' +
            '</div>' +
            '<hr class="result-divider">' +
            infoRows +
            '<div class="result-info-row"><span class="result-info-label">Date</span><span class="result-info-val">' + dateStr + '</span></div>' +
            '<div class="result-info-row"><span class="result-info-label">Time</span><span class="result-info-val">' + timeStr + '</span></div>' +
        '</div>';

    showScreen("screen-result");

    // Animate score number
    var scoreEl = document.getElementById("score-num");
    if (total > 0) {
        var cur = 0;
        var iv = setInterval(function() {
            cur++;
            scoreEl.textContent = cur;
            if (cur >= total) clearInterval(iv);
        }, 100);
    }

    // Confetti for high scores
    if (total >= 7) {
        setTimeout(createConfetti, 500);
    }

}

function pickRandomUniqueSets(count) {
    return shuffle(VOCAB_SETS).slice(0, count);
}

function initResultOnlyView() {
    state.userInfo = {
        className: "DSF",
        classNumber: "SFGD",
        name: "SDFGS",
        isGuest: false
    };

    state.exercises = pickRandomUniqueSets(3);
    state.scores = [
        Math.floor(Math.random() * 4),
        Math.floor(Math.random() * 4),
        Math.floor(Math.random() * 4)
    ];
    state.currentExercise = 2;
    state.checked = true;

    showResult();
}

/* ═══════════════════════════════════════
   Restart
   ═══════════════════════════════════════ */
function restart() {
    document.getElementById("inp-class").value = "";
    document.getElementById("inp-number").value = "";
    document.getElementById("inp-name").value = "";
    document.getElementById("form-error").style.display = "none";
    showScreen("screen-welcome");
}

/* ═══════════════════════════════════════
   Confetti
   ═══════════════════════════════════════ */
function createConfetti() {
    var box = document.createElement("div");
    box.className = "confetti-box";
    document.body.appendChild(box);
    var colors = ["#1e3a2f","#b86e3f","#5cb896","#d49a6a","#27764a","#e07040","#3d7a63"];
    for (var i = 0; i < 60; i++) {
        var p = document.createElement("div");
        p.className = "confetti-piece";
        var size = 6 + Math.random() * 9;
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = Math.random() * 100 + "%";
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.borderRadius = Math.random() > 0.5 ? "50%" : "2px";
        p.style.animationDuration = (2.2 + Math.random() * 2) + "s";
        p.style.animationDelay = Math.random() * 1.8 + "s";
        box.appendChild(p);
    }
    setTimeout(function() { box.remove(); }, 5500);
}

/* ═══════════════════════════════════════
   Topic Picker
   ═══════════════════════════════════════ */
function showTopicPicker() {
    var usedTopics = [];
    for (var i = 0; i < state.exercises.length; i++) {
        if (i !== state.currentExercise) {
            usedTopics.push(state.exercises[i].topic);
        }
    }
    var currentTopic = state.exercises[state.currentExercise] ? state.exercises[state.currentExercise].topic : "";

    var grid = "";
    for (var k = 0; k < VOCAB_SETS.length; k++) {
        var set = VOCAB_SETS[k];
        var isUsed = usedTopics.indexOf(set.topic) !== -1;
        var isCurrent = set.topic === currentTopic;
        var words = [];
        for (var j = 0; j < set.words.length; j++) { words.push(set.words[j].word); }
        var cls = "topic-card";
        if (isUsed) cls += " used";
        if (isCurrent) cls += " current-topic";
        grid += '<div class="' + cls + '" data-topic-idx="' + k + '">' +
            '<div class="topic-card-name">' + esc(set.topic.replace(/_/g, " ")) + '</div>' +
            '<div class="topic-card-words">' + esc(words.join(", ")) + '</div>' +
        '</div>';
    }

    var overlay = document.createElement("div");
    overlay.className = "modal-overlay";
    overlay.innerHTML = '<div class="modal-box" style="max-width:440px;width:94%;max-height:85vh;display:flex;flex-direction:column;padding:20px">' +
        '<div class="picker-heading">' +
            '<h3><i class="fa-solid fa-shuffle" style="font-size:16px;margin-right:6px"></i> Choose a Topic</h3>' +
            '<button class="picker-close" id="picker-close">&times;</button>' +
        '</div>' +
        '<div class="topic-picker-grid">' + grid + '</div>' +
    '</div>';

    document.body.appendChild(overlay);

    overlay.addEventListener("click", function(e) {
        if (e.target === overlay) overlay.remove();
    });
    document.getElementById("picker-close").addEventListener("click", function() { overlay.remove(); });

    var cards = overlay.querySelectorAll(".topic-card:not(.used)");
    cards.forEach(function(card) {
        card.addEventListener("click", function() {
            var idx = parseInt(card.dataset.topicIdx, 10);
            state.exercises[state.currentExercise] = VOCAB_SETS[idx];
            state.checked = false;
            overlay.remove();
            renderVocab();
            showScreen("screen-vocab");
        });
    });
}

/* ═══════════════════════════════════════
   Event Listeners
   ═══════════════════════════════════════ */
document.getElementById("btn-start").addEventListener("click", startAsStudent);
document.getElementById("btn-guest").addEventListener("click", startAsGuest);

// Allow Enter key on form inputs
document.querySelectorAll("#screen-welcome .form-input").forEach(function(inp) {
    inp.addEventListener("keydown", function(e) {
        if (e.key === "Enter") { startAsStudent(); }
    });
});

initResultOnlyView();
</script>
</body>
